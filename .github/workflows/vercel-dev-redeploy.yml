name: Vercel Dev Redeploy
run-name: Vercel dev redeploy (${{ github.event_name == 'workflow_dispatch' && 'manual' || github.ref_name }})

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: vercel-dev-redeploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  redeploy-development:
    name: Redeploy dev site
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'Upload media:') &&
      !startsWith(github.event.head_commit.message, 'Delete image:') &&
      !startsWith(github.event.head_commit.message, 'Delete unused media:'))
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 10
    steps:
      - name: Show deployment target
        run: echo "Triggering Vercel development deploy for branch dev"

      - name: Trigger Vercel Development Redeploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$DEPLOY_HOOK_URL"
