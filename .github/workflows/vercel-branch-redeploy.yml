name: Vercel Branch Redeploy

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Select which Vercel project to redeploy
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

env:
  REPOSITORY_OWNER: ${{ github.repository_owner }}
  REPOSITORY_NAME: ${{ github.event.repository.name }}

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.target_environment }}" in
            dev)
              echo "target_branch=dev" >> "$GITHUB_OUTPUT"
              echo "target_label=development" >> "$GITHUB_OUTPUT"
              ;;
            prod)
              echo "target_branch=main" >> "$GITHUB_OUTPUT"
              echo "target_label=production" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported target environment."
              exit 1
              ;;
          esac

      - name: Validate branch alignment
        shell: bash
        run: |
          set -euo pipefail
          echo "Manual redeploy requested for ${REPOSITORY_OWNER}/${REPOSITORY_NAME}."
          echo "Expected branch: ${{ steps.resolve.outputs.target_branch }}"
          echo "Current ref: ${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_NAME}" != "${{ steps.resolve.outputs.target_branch }}" ]]; then
            echo "Manual redeploy must be run from branch '${{ steps.resolve.outputs.target_branch }}'."
            exit 1
          fi

      - name: Trigger selected Vercel deploy hook
        shell: bash
        env:
          DEV_HOOK_URL: ${{ secrets.VERCEL_DEV_DEPLOY_HOOK_URL }}
          PROD_HOOK_URL: ${{ secrets.VERCEL_PROD_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          case "${{ inputs.target_environment }}" in
            dev)
              deploy_hook_url="${DEV_HOOK_URL:-}"
              ;;
            prod)
              deploy_hook_url="${PROD_HOOK_URL:-}"
              ;;
          esac
          if [[ -z "${deploy_hook_url}" ]]; then
            echo "The selected deploy hook secret is missing."
            exit 1
          fi
          response_file="$(mktemp)"
          status_code="$(
            curl --silent --show-error \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --request POST \
              "${deploy_hook_url}"
          )"
          if [[ "${status_code}" -lt 200 || "${status_code}" -ge 300 ]]; then
            echo "Vercel deploy hook failed with HTTP ${status_code}."
            cat "${response_file}"
            exit 1
          fi
          echo "Vercel deploy hook accepted with HTTP ${status_code} for ${{ steps.resolve.outputs.target_label }}."

