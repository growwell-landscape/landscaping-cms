name: Vercel Deploy (Dev & Prod)

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: production
        type: choice
        options:
          - development
          - production

concurrency:
  group: vercel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Decide Deployment Target
        id: target
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "env=production" >> $GITHUB_OUTPUT
              echo "hook=${{ secrets.VERCEL_PROD_DEPLOY_HOOK_URL }}" >> $GITHUB_OUTPUT
            elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
              echo "env=development" >> $GITHUB_OUTPUT
              echo "hook=${{ secrets.VERCEL_DEV_DEPLOY_HOOK_URL }}" >> $GITHUB_OUTPUT
            fi
          else
            if [[ "${{ github.event.inputs.target }}" == "production" ]]; then
              echo "env=production" >> $GITHUB_OUTPUT
              echo "hook=${{ secrets.VERCEL_PROD_DEPLOY_HOOK_URL }}" >> $GITHUB_OUTPUT
            else
              echo "env=development" >> $GITHUB_OUTPUT
              echo "hook=${{ secrets.VERCEL_DEV_DEPLOY_HOOK_URL }}" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Validate Deploy Hook
        run: |
          if [ -z "${{ steps.target.outputs.hook }}" ]; then
            echo "Deploy hook is missing!"
            exit 1
          fi

      - name: Trigger Vercel Deploy
        run: |
          echo "Deploying to ${{ steps.target.outputs.env }}"
          curl --fail --silent --show-error \
            --request POST \
            "${{ steps.target.outputs.hook }}"