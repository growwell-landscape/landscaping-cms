name: Vercel Branch Redeploy
run-name: >-
  Vercel redeploy
  (${{
    github.event_name == 'workflow_dispatch' && github.event.inputs.target ||
    github.ref_name
  }})

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: development
        type: choice
        options:
          - development
          - production

concurrency:
  group: vercel-redeploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  redeploy-production:
    name: Redeploy production site
    if: >-
      (github.event_name == 'push' &&
      github.ref_name == 'main' &&
      !startsWith(github.event.head_commit.message, 'Upload media:') &&
      !startsWith(github.event.head_commit.message, 'Delete image:') &&
      !startsWith(github.event.head_commit.message, 'Delete unused media:')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    steps:
      - name: Show deployment target
        run: echo "Triggering Vercel production deploy for branch main"

      - name: Trigger Vercel Production Redeploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_PROD_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_PROD_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$DEPLOY_HOOK_URL"

  redeploy-development:
    name: Redeploy dev site
    if: >-
      (github.event_name == 'push' &&
      github.ref_name == 'dev' &&
      !startsWith(github.event.head_commit.message, 'Upload media:') &&
      !startsWith(github.event.head_commit.message, 'Delete image:') &&
      !startsWith(github.event.head_commit.message, 'Delete unused media:')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'development')
    runs-on: ubuntu-latest
    environment: development
    timeout-minutes: 10
    steps:
      - name: Show deployment target
        run: echo "Triggering Vercel development deploy for branch dev"

      - name: Trigger Vercel Development Redeploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEV_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing secret: VERCEL_DEV_DEPLOY_HOOK_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            "$DEPLOY_HOOK_URL"
